name: CI - Evaluation Service (Go)

on:
  push:
    branches: [main, develop]
    paths:
      - 'evaluation-service/**'
      - '.github/workflows/ci-evaluation.yml'
      - '.github/workflows/ci-go-reusable.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'evaluation-service/**'
      - '.github/workflows/ci-evaluation.yml'
      - '.github/workflows/ci-go-reusable.yml'

permissions:
  contents: read
  security-events: write
  packages: read
  id-token: write

jobs:
  call-go-ci:
    uses: ./.github/workflows/ci-go-reusable.yml
    with:
      service_name: evaluation-service
      service_path: evaluation-service
      go_version: '1.21'
    secrets:
      gcp_project_id: ${{ secrets.GCP_PROJECT_ID }}
      gcp_workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
      gcp_service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}
      gh_token: ${{ secrets.GITHUB_TOKEN }}
