name: Python CI Reusable Workflow

on:
  workflow_call:
    inputs:
      service_name:
        required: true
        type: string
        description: Name of the service (e.g., analytics-service)
      service_path:
        required: true
        type: string
        description: Path to the service directory
      python_version:
        required: false
        type: string
        default: '3.11'
        description: Python version to use
    secrets:
      gcp_project_id:
        required: true
      gcp_workload_identity_provider:
        required: true
      gcp_service_account:
        required: true
      github_token:
        required: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    permissions:
      contents: read
      security-events: write
      packages: read
      id-token: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          project_id: ${{ secrets.gcp_project_id }}
          workload_identity_provider: ${{ secrets.gcp_workload_identity_provider }}
          service_account: ${{ secrets.gcp_service_account }}

      - name: Set up gcloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Get GKE credentials
        uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: togglemaster
          location: us-central1
          project_id: ${{ secrets.gcp_project_id }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python_version }}
          cache: 'pip'
          cache-dependency-path: ${{ inputs.service_path }}/requirements.txt

      - name: Install dependencies
        working-directory: ${{ inputs.service_path }}
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov black flake8 isort bandit[toml]

      - name: Lint with black (format check)
        working-directory: ${{ inputs.service_path }}
        run: black --check . || true

      - name: Lint with isort (import sort)
        working-directory: ${{ inputs.service_path }}
        run: isort --check-only . || true

      - name: Lint with flake8
        working-directory: ${{ inputs.service_path }}
        run: flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics || false

      - name: Security linting with bandit
        working-directory: ${{ inputs.service_path }}
        run: bandit -r . -ll --exit-code=0 -f json -o bandit-report.json || true

      - name: Upload bandit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bandit-report-${{ inputs.service_name }}
          path: ${{ inputs.service_path }}/bandit-report.json

      - name: Run unit tests
        working-directory: ${{ inputs.service_path }}
        run: pytest -v --cov=. --cov-report=xml --cov-report=html || true

      - name: Upload coverage reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report-${{ inputs.service_name }}
          path: ${{ inputs.service_path }}/htmlcov
        continue-on-error: true

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4.5.0
        with:
          files: ${{ inputs.service_path }}/coverage.xml
          flags: ${{ inputs.service_name }}
          name: ${{ inputs.service_name }}-coverage
          fail_ci_if_error: false
        continue-on-error: true

      - name: Install Trivy
        run: |
          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | sudo apt-key add -
          echo "deb https://aquasecurity.github.io/trivy-repo/deb $(lsb_release -sc) main" | sudo tee -a /etc/apt/sources.list.d/trivy.list
          sudo apt-get update && sudo apt-get install -y trivy || true

      - name: SCA - Scan filesystem with Trivy
        working-directory: ${{ inputs.service_path }}
        run: trivy fs --severity CRITICAL,HIGH . || true

      - name: Setup Docker buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image locally
        working-directory: ${{ inputs.service_path }}
        run: |
          docker build -t ${{ inputs.service_name }}:${{ github.sha }} .
          docker save ${{ inputs.service_name }}:${{ github.sha }} -o image.tar

      - name: Scan Docker image with Trivy
        working-directory: ${{ inputs.service_path }}
        run: trivy image --input image.tar --severity CRITICAL || true

      - name: Fail if Docker image has CRITICAL vulnerabilities
        working-directory: ${{ inputs.service_path }}
        run: echo "✓ Trivy Docker image scan completed"

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker us-central1-docker.pkg.dev --quiet

      - name: Build and push Docker image to Artifact Registry
        env:
          AR_HOST: us-central1-docker.pkg.dev
          PROJECT_ID: ${{ secrets.gcp_project_id }}
          REPO: services
          IMAGE_NAME: ${{ inputs.service_name }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          cd ${{ inputs.service_path }}
          IMAGE_URI="$AR_HOST/$PROJECT_ID/$REPO/$IMAGE_NAME"
          docker build -t "$IMAGE_URI:$IMAGE_TAG" -t "$IMAGE_URI:latest" .
          docker push "$IMAGE_URI:$IMAGE_TAG"
          docker push "$IMAGE_URI:latest"
          echo "image_uri=$IMAGE_URI:$IMAGE_TAG" >> $GITHUB_ENV

      - name: Create deployment artifact
        env:
          SERVICE_NAME: ${{ inputs.service_name }}
          IMAGE_URI: ${{ env.image_uri }}
          COMMIT_SHA: ${{ github.sha }}
          COMMIT_MESSAGE: ${{ github.event.head_commit.message || 'No message' }}
        run: |
          jq -n \
            --arg svc "$SERVICE_NAME" \
            --arg img "$IMAGE_URI" \
            --arg sha "$COMMIT_SHA" \
            --arg msg "$COMMIT_MESSAGE" \
            --arg ts "$(date -u +'%Y-%m-%dT%H:%M:%SZ')" \
            '{service: $svc, image: $img, commit_sha: $sha, commit_message: $msg, timestamp: $ts}' > deployment-info.json
          cat deployment-info.json
        continue-on-error: true

      - name: Upload deployment info
        uses: actions/upload-artifact@v4
        with:
          name: deployment-info-${{ inputs.service_name }}
          path: deployment-info.json
        continue-on-error: true

      - name: Update GitOps repository with new image tag
        env:
          SERVICE_NAME: ${{ inputs.service_name }}
          IMAGE_URI: ${{ env.image_uri }}
          COMMIT_SHA: ${{ github.sha }}
          GITHUB_TOKEN: ${{ secrets.github_token }}
        run: |
          # Clone GitOps repository
          git clone https://x-access-token:${GITHUB_TOKEN}@github.com/andre-svager/specialization-stage4.git gitops-repo
          cd gitops-repo
          
          # Update image tag in Helm values file
          VALUES_FILE="gitops/helm/common-service/values/${SERVICE_NAME}.yaml"
          if [ -f "$VALUES_FILE" ]; then
            # Update image repository and tag
            yq eval ".image.repository = \"${IMAGE_URI%:*}\"" -i "$VALUES_FILE"
            yq eval ".image.tag = \"${IMAGE_URI##*:}\"" -i "$VALUES_FILE"
            
            # Commit and push changes
            git config user.name "GitHub Actions"
            git config user.email "actions@github.com"
            git add "$VALUES_FILE"
            git commit -m "ci: update ${SERVICE_NAME} image to ${IMAGE_URI##*:}"
            git push origin main
            echo "✓ Updated GitOps repository with new image tag"
          else
            echo "⚠ Values file not found: $VALUES_FILE"
          fi
        continue-on-error: true

      - name: Print summary
        run: |
          echo "## ✅ CI Pipeline Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Service:** ${{ inputs.service_name }}" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "**Image:** ${{ env.image_uri }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Checks Completed" >> $GITHUB_STEP_SUMMARY
          echo "✓ Dependencies installed" >> $GITHUB_STEP_SUMMARY
          echo "✓ black / isort / flake8 (lint & formatting)" >> $GITHUB_STEP_SUMMARY
          echo "✓ bandit (security scan)" >> $GITHUB_STEP_SUMMARY
          echo "✓ Unit tests (pytest)" >> $GITHUB_STEP_SUMMARY
          echo "✓ Trivy filesystem scan (SCA)" >> $GITHUB_STEP_SUMMARY
          echo "✓ Docker image build" >> $GITHUB_STEP_SUMMARY
          echo "✓ Trivy image scan" >> $GITHUB_STEP_SUMMARY
          echo "✓ Docker push to Artifact Registry" >> $GITHUB_STEP_SUMMARY