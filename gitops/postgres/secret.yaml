apiVersion: v1
kind: Secret
metadata:
  name: postgres-secret
  namespace: db-infra
type: Opaque
stringData:
  POSTGRES_USER: "postgres"
  POSTGRES_PASSWORD: "REPLACE_ME_ADMIN_PASSWORD"
---
apiVersion: v1
kind: Secret
metadata:
  name: auth-db-credentials
  namespace: db-infra
type: Opaque
stringData:
  DB_USER: "auth_service"
  DB_PASSWORD: "REPLACE_ME_AUTH_PASSWORD"
---
apiVersion: v1
kind: Secret
metadata:
  name: flag-db-credentials
  namespace: db-infra
type: Opaque
stringData:
  DB_USER: "flag_service"
  DB_PASSWORD: "REPLACE_ME_FLAG_PASSWORD"
---
apiVersion: v1
kind: Secret
metadata:
  name: target-db-credentials
  namespace: db-infra
type: Opaque
stringData:
  DB_USER: "target_service"
  DB_PASSWORD: "REPLACE_ME_TARGET_PASSWORD"