apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-init-scripts
  namespace: db-infra
data:
  init-multi-db.sql: |
    CREATE DATABASE auth_db;
    CREATE DATABASE flag_db;
    CREATE DATABASE target_db;

    CREATE USER auth_service WITH PASSWORD 'REPLACE_ME_AUTH_PASSWORD';
    GRANT ALL PRIVILEGES ON DATABASE auth_db TO auth_service;

    CREATE USER flag_service WITH PASSWORD 'REPLACE_ME_FLAG_PASSWORD';
    GRANT ALL PRIVILEGES ON DATABASE flag_db TO flag_service;

    CREATE USER target_service WITH PASSWORD 'REPLACE_ME_TARGET_PASSWORD';
    GRANT ALL PRIVILEGES ON DATABASE target_db TO target_service;

    \c auth_db
    CREATE TABLE IF NOT EXISTS api_keys (
        id SERIAL PRIMARY KEY,
        name VARCHAR(100) NOT NULL,
        key_hash VARCHAR(64) NOT NULL UNIQUE,
        is_active BOOLEAN DEFAULT true,
        created_at TIMESTAMP WITH TIME ZONE DEFAULT CURRENT_TIMESTAMP
    );
    GRANT ALL PRIVILEGES ON TABLE api_keys TO auth_service;
    GRANT ALL PRIVILEGES ON SEQUENCE api_keys_id_seq TO auth_service;

    \c flag_db
    CREATE TABLE IF NOT EXISTS flags (
        id SERIAL PRIMARY KEY,
        name VARCHAR(100) UNIQUE NOT NULL,
        description TEXT,
        is_enabled BOOLEAN NOT NULL DEFAULT false,
        created_at TIMESTAMP WITH TIME ZONE DEFAULT CURRENT_TIMESTAMP,
        updated_at TIMESTAMP WITH TIME ZONE DEFAULT CURRENT_TIMESTAMP
    );
    GRANT ALL PRIVILEGES ON TABLE flags TO flag_service;
    GRANT ALL PRIVILEGES ON SEQUENCE flags_id_seq TO flag_service;

    \c target_db
    CREATE TABLE IF NOT EXISTS targeting_rules (
        id SERIAL PRIMARY KEY,
        flag_name VARCHAR(100) UNIQUE NOT NULL,
        is_enabled BOOLEAN NOT NULL DEFAULT true,
        rules JSONB NOT NULL,
        created_at TIMESTAMP WITH TIME ZONE DEFAULT CURRENT_TIMESTAMP,
        updated_at TIMESTAMP WITH TIME ZONE DEFAULT CURRENT_TIMESTAMP
    );
    GRANT ALL PRIVILEGES ON TABLE targeting_rules TO target_service;
    GRANT ALL PRIVILEGES ON SEQUENCE targeting_rules_id_seq TO target_service;