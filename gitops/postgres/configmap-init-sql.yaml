apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-init-scripts
  namespace: db-infra
data:
  init-multi-db.sql: |
    CREATE DATABASE auth_db;
    CREATE DATABASE flag_db;
    CREATE DATABASE target_db;

    CREATE USER auth_service WITH PASSWORD 'REPLACE_ME_AUTH_PASSWORD';
    GRANT ALL PRIVILEGES ON DATABASE auth_db TO auth_service;

    CREATE USER flag_service WITH PASSWORD 'REPLACE_ME_FLAG_PASSWORD';
    GRANT ALL PRIVILEGES ON DATABASE flag_db TO flag_service;

    CREATE USER target_service WITH PASSWORD 'REPLACE_ME_TARGET_PASSWORD';
    GRANT ALL PRIVILEGES ON DATABASE target_db TO target_service;

    \c auth_db
    CREATE TABLE IF NOT EXISTS api_keys (
        id SERIAL PRIMARY KEY,
        name VARCHAR(100) NOT NULL,
        key_hash VARCHAR(64) NOT NULL UNIQUE,
        is_active BOOLEAN DEFAULT true,
        created_at TIMESTAMP WITH TIME ZONE DEFAULT CURRENT_TIMESTAMP
    );
    GRANT ALL PRIVILEGES ON ALL TABLES IN SCHEMA public TO auth_service;
    GRANT ALL PRIVILEGES ON ALL SEQUENCES IN SCHEMA public TO auth_service;

    \c flag_db
    CREATE TABLE IF NOT EXISTS flags (
        id SERIAL PRIMARY KEY,
        name VARCHAR(255) UNIQUE NOT NULL,
        enabled BOOLEAN DEFAULT false
    );
    GRANT ALL PRIVILEGES ON ALL TABLES IN SCHEMA public TO flag_service;
    GRANT ALL PRIVILEGES ON ALL SEQUENCES IN SCHEMA public TO flag_service;

    \c target_db
    CREATE TABLE IF NOT EXISTS events (
        event_id VARCHAR(255) PRIMARY KEY,
        flag_name VARCHAR(255),
        user_id VARCHAR(255),
        created_at TIMESTAMP DEFAULT now()
    );
    GRANT ALL PRIVILEGES ON ALL TABLES IN SCHEMA public TO target_service;
    GRANT ALL PRIVILEGES ON ALL SEQUENCES IN SCHEMA public TO target_service;