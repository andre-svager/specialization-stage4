apiVersion: v1
kind: ConfigMap
metadata:
  name: argocd-cm
  namespace: argocd
data:
  # Enable application.instanceLabelKey in all namespaces
  application.instanceLabelKey: argocd.argoproj.io/instance
  
  # Repository configuration (will be configured via ArgoCD UI or CLI)
  repositories: |
    - type: git
      url: https://github.com/andre-svager/specialization-stage4.git
      name: gitops-repo
  
  # URL configuration (update with your actual domain)
  url: https://argocd.example.com
  
  # Disable admin user for production (enable OIDC instead)
  admin.enabled: "true"
