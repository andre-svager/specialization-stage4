apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: default

# Configurações gerais da base
commonLabels:
  app.kubernetes.io/managed-by: argocd
  app.kubernetes.io/part-of: fiap-platform

resources:
  - ../helm/common-service

# Configurações comuns
configMapGenerator:
  - name: app-config
    literals:
      - LOG_LEVEL=INFO
      - ENVIRONMENT=base

secretGenerator:
  - name: app-secrets
    literals:
      - DATABASE_PASSWORD=change-me

# Note: Resource management is now handled via Helm values in common-service/values/
# Kustomize overlays can still be used for environment-specific customizations
