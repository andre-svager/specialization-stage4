apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: default

namePrefix: staging-

bases:
  - ../base

commonLabels:
  environment: staging
  tier: staging

commonAnnotations:
  kustomize.config.k8s.io/environment: staging

# Staging-specific configuration
# Note: Most configuration now handled via Helm values in common-service/values/
# Use environment-specific values files instead: values-staging/analytics-service.yaml, etc.

# This overlay can be used for Kustomize-specific customizations
# that are not easily handled via Helm values

configMapGenerator:
  - name: app-config
    behavior: merge
    literals:
      - LOG_LEVEL=INFO
      - ENVIRONMENT=staging
