# Flag Service - Specific Values
serviceName: flag-service

image:
  repository: 973397181776.dkr.ecr.us-east-1.amazonaws.com/flag-service

podAnnotations:
  prometheus.io/scrape: "true"
  prometheus.io/port: "8002"
  prometheus.io/path: "/metrics"

service:
  port: 8002
  targetPort: 8002

ingress:
  hosts:
    - host: flags.example.com
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: flag-tls
      hosts:
        - flags.example.com

env:
  - name: LOG_LEVEL
    value: "INFO"
  - name: ENVIRONMENT
    value: "staging"

database:
  enabled: true
  secretName: flag-db-credentials
  createSecret: false
  host: staging-flag-db.c8k5zq8g0qxw.us-east-1.rds.amazonaws.com
  name: flags_db

livenessProbe:
  httpGet:
    path: /health
    port: 8002

readinessProbe:
  httpGet:
    path: /health
    port: 8002
