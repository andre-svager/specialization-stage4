# Target Service - Specific Values
serviceName: target-service

image:
  repository: 973397181776.dkr.ecr.us-east-1.amazonaws.com/target-service

podAnnotations:
  prometheus.io/scrape: "true"
  prometheus.io/port: "8003"
  prometheus.io/path: "/metrics"

service:
  port: 8003
  targetPort: 8003

ingress:
  hosts:
    - host: targets.example.com
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: target-tls
      hosts:
        - targets.example.com

env:
  - name: LOG_LEVEL
    value: "INFO"
  - name: ENVIRONMENT
    value: "staging"

database:
  enabled: true
  secretName: target-db-credentials
  createSecret: false
  host: staging-target-db.c8k5zq8g0qxw.us-east-1.rds.amazonaws.com
  name: targeting_db

livenessProbe:
  httpGet:
    path: /health
    port: 8003

readinessProbe:
  httpGet:
    path: /health
    port: 8003
