# Target Service - Specific Values
serviceName: target-service

image:
  repository: us-central1-docker.pkg.dev/fiap-502903/target-service/target-service

podAnnotations:
  prometheus.io/scrape: "true"
  prometheus.io/port: "8003"
  prometheus.io/path: "/metrics"

service:
  port: 8003
  targetPort: 8003

ingress:
  hosts:
    - host: targets.example.com
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: target-tls
      hosts:
        - targets.example.com

env:
  - name: LOG_LEVEL
    value: "INFO"
  - name: ENVIRONMENT
    value: "staging"
  - name: PORT
    value: "8003"
  - name: GCP_PROJECT_ID
    value: "fiap-502903"
  - name: AUTH_SERVICE_URL
    value: "http://auth-service.default.svc.cluster.local:8001"  

database:
  enabled: true
  secretName: target-db-credentials
  createSecret: false
  host: postgres.db-infra.svc.cluster.local
  port: 5432
  name: target_db
  user: target_service

livenessProbe:
  httpGet:
    path: /health
    port: 8003

readinessProbe:
  httpGet:
    path: /health
    port: 8003
