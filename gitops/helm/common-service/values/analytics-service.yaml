# Analytics Service - Specific Values
serviceName: analytics-service
serviceAccount:
  create: true
  name: analytics-service
  annotations:
    iam.gke.io/gcp-service-account: analytics-service@fiap-502903.iam.gserviceaccount.com
image:
  repository: us-central1-docker.pkg.dev/fiap-502903/analytics-service/analytics-service
  tag: c625fc700ecb8866d2e69490c6fe66b4e1b3e09a
podAnnotations:
  prometheus.io/scrape: "true"
  prometheus.io/port: "8005"
  prometheus.io/path: "/metrics"
service:
  port: 8080
  targetPort: 8005
ingress:
  hosts:
    - host: analytics.example.com
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: analytics-tls
      hosts:
        - analytics.example.com
env:
  - name: LOG_LEVEL
    value: "INFO"
  - name: ENVIRONMENT
    value: "staging"
  - name: PORT
    value: "8005"
  - name: GCP_PROJECT_ID
    value: "fiap-502903"
  - name: GCP_PUBSUB_TOPIC
    value: "toggle-master-analytics-events"
  - name: GCP_PUBSUB_SUBSCRIPTION
    value: "toggle-master-analytics-worker-sub"
  - name: GCP_FIRESTORE_COLLECTION
    value: "ToggleMasterAnalytics"
database:
  enabled: false
livenessProbe:
  httpGet:
    path: /health
    port: 8005
readinessProbe:
  httpGet:
    path: /health
    port: 8005
