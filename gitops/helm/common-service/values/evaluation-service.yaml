# Evaluation Service - Specific Values
serviceName: evaluation-service

image:
  repository: 973397181776.dkr.ecr.us-east-1.amazonaws.com/evaluation-service

imagePullSecrets:
  - name: ecr-secret

podAnnotations:
  prometheus.io/scrape: "true"
  prometheus.io/port: "8080"
  prometheus.io/path: "/metrics"

service:
  port: 8080
  targetPort: 8004

ingress:
  hosts:
    - host: evaluation.example.com
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: evaluation-tls
      hosts:
        - evaluation.example.com

env:
  - name: LOG_LEVEL
    value: "INFO"
  - name: ENVIRONMENT
    value: "staging"
  - name: AWS_REGION
    value: "us-east-1"
  - name: REDIS_URL
    value: "redis://redis:6379"
  - name: SQS_QUEUE_URL
    value: "https://sqs.us-east-1.amazonaws.com/973397181776/staging-evaluation-queue.fifo"
  - name: AWS_SQS_URL
    value: "https://sqs.us-east-1.amazonaws.com/973397181776/staging-evaluation-queue.fifo"
  - name: FLAG_SERVICE_URL
    value: "http://flag-service:8000"
  - name: TARGETING_SERVICE_URL
    value: "http://target-service:8000"

livenessProbe:
  httpGet:
    path: /health
    port: 8004

readinessProbe:
  httpGet:
    path: /health
    port: 8004

# Message Queue Configuration
messageQueue:
  enabled: true
  type: sqs
  region: us-east-1
