{{- if and .Values.database.enabled .Values.database.createSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "common-service.fullname" . }}-db
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "common-service.labels" . | nindent 4 }}
type: Opaque
stringData:
  password: "CHANGE_ME_IN_PRODUCTION"  # Use sealed-secrets or external-secrets in production
{{- end }}
